services:
  # Single Postgres instance serves both erpclaw's own database (POSTGRES_DB
  # below) and erdwithai Studio's database ("erdwithai", created by the init
  # script). Studio itself isn't containerized here — run it locally with
  # `bun run dev`, pointed at:
  #   DATABASE_URL=postgresql://erdwithai:erdwithai_dev_password@localhost:5432/erdwithai
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erpclaw
      POSTGRES_USER: erpclaw
      POSTGRES_PASSWORD: erpclaw_dev_password
    ports:
      - "5432:5432"
    volumes:
      - erpclaw_pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpclaw"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: erpclaw-gateway/Dockerfile
    environment:
      ERPCLAW_DB_URL: postgresql://erpclaw:erpclaw_dev_password@postgres:5432/erpclaw
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      ERPCLAW_REPO_ROOT: /app/erpclaw
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./erpclaw:/app/erpclaw:ro

volumes:
  erpclaw_pg_data:
