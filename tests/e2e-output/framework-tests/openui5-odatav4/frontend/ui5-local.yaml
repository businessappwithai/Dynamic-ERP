# UI5 Tooling Local Configuration
# Used for local development
# Generated: 2026-02-09T13:00:27.001Z

specVersion: "3.0"
metadata:
  name: openui5-odatav4-test-app
type: application

server:
  customMiddleware:
    # Mock server for local development
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp

    # Proxy to local backend
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: true
        backend:
          - path: /odata
            url: http://localhost:3000
