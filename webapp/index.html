<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Hospital Management System</title>

  <!-- SAP UI5 Bootstrap - use local resources served by ui5 serve -->
  <script
  id="sap-ui-bootstrap"
  src="/resources/sap-ui-core.js"
  data-sap-ui-theme="sap_horizon"
  data-sap-ui-libs="sap.m,sap.f,sap.ui.core,sap.ui.layout,sap.uxap"
  data-sap-ui-async="true"
  data-sap-ui-compat-version="edge"
  data-sap-ui-preload=""
  data-sap-ui-resource-roots='{"hospital-management-system": "./"}'
  data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
  data-sap-ui-frame-options="allow"
  data-sap-ui-xx-nocjs="true"
  data-sap-ui-app-id="hospital-management-system"
  data-sap-ui-log-level="4"
></script>



  <!-- Application Styles -->
  <style>
    /* Initial loading styles */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "72", Arial, Helvetica, sans-serif;
    }

    /* Busy indicator during initial load */
    #content {
      height: 100%;
    }
  </style>
</head>
<body class="sapUiBody" id="content">
  <div
    id="shell"
    data-sap-ui-component
    data-name="hospital-management-system"
    data-settings='{"id": "appView"}'
    style="height: 100%">
  </div>

  <noscript>
    <div style="padding: 20px; text-align: center;">
      <h1>JavaScript Required</h1>
      <p>This application requires JavaScript to be enabled. Please enable JavaScript in your browser settings.</p>
    </div>
  </noscript>
</body>
</html>
